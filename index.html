<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일룸 유통망 + 경쟁사 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Leaflet (폴백용) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- 카카오 SDK: 반드시 실행 코드보다 먼저 선언 -->
<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=625310b264d6d44999e623855ae46f03&libraries=services&autoload=false"></script>
<script src="competitors_data.js"></script>
<script src="sales_data.js"></script>
<script src="population_data.js"></script>
<script src="district_boundaries.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e222d;
    --border: #2a2f3d;
    --accent: #e8463a;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --text-muted: #7a8099;
    --text-dim: #4a5068;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif; background: var(--bg);
    color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-mark {
    width: 32px; height: 32px; background: var(--accent); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; letter-spacing: -0.5px; color: #fff;
  }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; color: var(--text-muted); font-weight: 300; }
  .header-tabs { display: flex; gap: 4px; margin-left: 24px; }
  .header-tab {
    padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .header-tab:hover { background: var(--surface2); color: var(--text); }
  .header-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .header-stats { display: flex; gap: 24px; }
  .stat-item { text-align: right; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .map-engine-badge {
    font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--surface2);
    color: var(--text-dim); border: 1px solid var(--border); margin-left: 8px;
  }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 360px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .sidebar-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  .search-box {
    display: flex; align-items: center; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; gap: 8px;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box svg { color: var(--text-dim); flex-shrink: 0; }
  .search-box input {
    background: none; border: none; outline: none; color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; width: 100%; height: 36px;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .region-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .region-btn {
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .region-btn:hover { border-color: var(--accent); color: var(--accent); }
  .region-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .store-count { font-size: 11px; color: var(--text-dim); margin-top: 8px; }
  .store-count span { color: var(--accent); font-family: 'DM Mono', monospace; font-weight: 500; }
  .store-list { overflow-y: auto; flex: 1; padding: 8px 0; }
  .store-list::-webkit-scrollbar { width: 4px; }
  .store-list::-webkit-scrollbar-track { background: transparent; }
  .store-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .store-item {
    padding: 12px 20px; cursor: pointer; border-left: 3px solid transparent;
    transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px;
  }
  .store-item:hover { background: var(--surface2); border-left-color: var(--accent2); }
  .store-item.active { background: var(--surface2); border-left-color: var(--accent); }
  .store-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); min-width: 24px; padding-top: 2px; }
  .store-info { flex: 1; min-width: 0; }
  .store-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .stype-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; flex-shrink: 0;
  }
  .stype-tag.direct { background: rgba(52,211,153,0.15); color: #34d399; }
  .stype-tag.dealer { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .store-addr { font-size: 12px; color: var(--text-muted); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .store-region-tag {
    font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--surface2);
    color: var(--text-dim); border: 1px solid var(--border); flex-shrink: 0; margin-top: 2px;
  }
  .map-container { flex: 1; position: relative; overflow: hidden; }
  #map { width: 100%; height: 100%; background: #1a1a2e; }
  .info-panel {
    position: absolute; top: 0; right: 0; bottom: 0; width: 420px;
    background: var(--surface); border-left: 1px solid var(--border);
    padding: 24px; box-shadow: -4px 0 24px rgba(0,0,0,0.4);
    transform: translateX(100%); opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none; z-index: 1000; overflow-y: auto;
  }
  .info-panel.visible { transform: translateX(0); opacity: 1; pointer-events: all; }
  .info-panel::-webkit-scrollbar { width: 4px; }
  .info-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .info-panel-close {
    position: absolute; top: 16px; left: 16px; width: 30px; height: 30px;
    border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 16px; z-index: 10;
  }
  .info-panel-close:hover { background: var(--border); }
  .panel-close-below { top: 54px; left: auto; right: 16px; }
  .info-panel-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--accent); margin-bottom: 8px;
  }
  .info-panel-tag::before {
    content: ''; display: block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
  }
  .info-panel-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
  .info-panel-addr {
    font-size: 12px; color: var(--text-muted); line-height: 1.5;
    padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 14px;
  }
  .info-placeholder {
    background: var(--surface2); border: 1px dashed var(--border); border-radius: 8px;
    padding: 12px; font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.6;
  }
  .info-placeholder strong { display: block; color: var(--text-muted); margin-bottom: 2px; font-size: 12px; }
  .no-results { padding: 32px 20px; text-align: center; color: var(--text-dim); font-size: 13px; }
  .brand-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .brand-btn {
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .brand-btn:hover { opacity: 0.85; }
  .brand-btn.active { color: #fff; }
  .brand-btn[data-brand="일룸"].active { background: #e8463a; border-color: #e8463a; }
  .brand-btn[data-brand="한샘"].active { background: #3b82f6; border-color: #3b82f6; }
  .brand-btn[data-brand="리바트"].active { background: #10b981; border-color: #10b981; }
  .brand-btn[data-brand="까사미아"].active { background: #a855f7; border-color: #a855f7; }
  .brand-btn[data-brand="에몬스"].active { background: #f59e0b; border-color: #f59e0b; }
  .store-brand-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; margin-top: 4px;
  }
  .panel-section { margin-top: 14px; }
  .panel-section-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .panel-section-title::before { content: ''; display: block; width: 3px; height: 12px; background: var(--accent); border-radius: 2px; }
  .sales-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px;
  }
  .sales-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .sales-row:last-child { margin-bottom: 0; }
  .sales-label { font-size: 11px; color: var(--text-dim); }
  .sales-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
  .sales-change { font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
  .sales-change.up { color: #34d399; background: rgba(52,211,153,0.1); }
  .sales-change.down { color: #f87171; background: rgba(248,113,113,0.1); }
  .rank-badge { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; }
  .competitor-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px;
  }
  .competitor-row .brand-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .competitor-row .comp-info { flex: 1; min-width: 0; }
  .competitor-row .comp-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .competitor-row .comp-dist { font-size: 10px; color: var(--text-dim); }
  .competitor-row .comp-sales { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .bar-chart { margin-top: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .bar-label { font-size: 10px; color: var(--text-muted); width: 50px; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 16px; background: var(--bg); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; display: flex; align-items: center; padding-left: 6px; }
  .bar-value { font-size: 9px; font-family: 'DM Mono', monospace; color: #fff; white-space: nowrap; }
  /* 비교 모드 */
  .compare-bar {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 16px; display: flex; align-items: center; gap: 12px;
    z-index: 1001; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: all 0.2s; opacity: 0; pointer-events: none;
  }
  .compare-bar.visible { opacity: 1; pointer-events: all; }
  .compare-bar .compare-text { font-size: 12px; color: var(--text-muted); }
  .compare-bar .compare-text span { color: var(--accent); font-weight: 600; }
  .compare-bar button {
    padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif; border: none; transition: all 0.15s;
  }
  .btn-compare { background: var(--accent); color: #fff; }
  .btn-compare:hover { opacity: 0.85; }
  .btn-compare:disabled { background: var(--surface2); color: var(--text-dim); cursor: not-allowed; }
  .btn-cancel { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border) !important; }
  .btn-cancel:hover { background: var(--border); }
  .store-item .compare-check {
    width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent;
  }
  .store-item .compare-check.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* 비교 패널 */
  .compare-panel {
    position: absolute; top: 0; right: 0; bottom: 0; width: 420px; transform: translateX(100%);
    background: var(--surface); border-left: 1px solid var(--border);
    padding: 24px; box-shadow: -4px 0 24px rgba(0,0,0,0.4);
    z-index: 1001; opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto;
  }
  .compare-panel.visible { transform: translateX(0); opacity: 1; pointer-events: all; }
  .compare-panel::-webkit-scrollbar { height: 4px; }
  .compare-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .compare-table th { font-size: 10px; color: var(--text-dim); font-weight: 500; text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  .compare-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; }
  .compare-table .brand-col { font-weight: 600; white-space: nowrap; }
  .compare-table .num-col { font-family: 'DM Mono', monospace; text-align: right; }
  /* 내보내기 + 비교 토글 버튼 */
  .map-toolbar {
    position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 1001;
  }
  .toolbar-btn {
    padding: 7px 12px; border-radius: 8px; font-size: 11px; font-weight: 500;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted); transition: all 0.15s;
    display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .toolbar-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .toolbar-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toolbar-btn svg { width: 14px; height: 14px; }
  /* 반경 슬라이더 */
  .radius-slider-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding: 8px 0; }
  .radius-slider-wrap label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .radius-slider-wrap input[type=range] {
    flex: 1; -webkit-appearance: none; height: 4px; background: var(--border); border-radius: 2px; outline: none;
  }
  .radius-slider-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--surface);
  }
  .radius-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); min-width: 36px; text-align: right; }
  /* 히트맵 범례 */
  .heatmap-legend {
    position: absolute; bottom: 24px; left: 24px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; z-index: 50; display: none; font-size: 11px;
  }
  .heatmap-legend.visible { display: block; }
  .legend-title { font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  .legend-circle { border-radius: 50%; flex-shrink: 0; }
  /* 지역 대시보드 - 좌측 세로 패널 (flex 항목, 지도 옆) */
  .region-dashboard {
    width: 880px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 22px 26px 22px 26px; display: none;
    overflow-y: auto;
    position: relative;
  }
  .region-dashboard.visible { display: block; }
  .region-dashboard::-webkit-scrollbar { width: 6px; }
  .region-dashboard::-webkit-scrollbar-track { background: transparent; }
  .region-dashboard::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .region-dashboard-close {
    position: absolute; top: 16px; right: 16px; width: 28px; height: 28px;
    border-radius: 50%; background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 14px;
  }
  .region-dashboard-close:hover { background: var(--border); }
  .rd-header { font-size: 20px; font-weight: 700; margin-bottom: 6px; padding-right: 36px; }
  .rd-pop-line { font-size: 14px; color: #cbd5e1; margin-bottom: 18px; padding-right: 36px; }
  .rd-pop-line strong { color: #fff; font-family: 'DM Mono', monospace; font-size: 16px; }
  .rd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .rd-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; text-align: left;
  }
  .rd-brand { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .rd-count { font-size: 30px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .rd-sales { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .rd-bar-wrap { margin-top: 8px; height: 5px; background: var(--border); border-radius: 3px; }
  .rd-bar { height: 100%; border-radius: 3px; }
  /* 공백 분석 */
  .gap-sub-tab {
    flex: 1; padding: 7px 0; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .gap-sub-tab:hover { background: var(--surface2); color: var(--text); }
  .gap-sub-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .gap-brand-btn, .gap-brand-btn-metro, .gap-radius-btn, .gap-radius-btn-metro {
    padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }
  .gap-brand-btn.active, .gap-brand-btn-metro.active, .gap-radius-btn.active, .gap-radius-btn-metro.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .gap-zone {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
  }
  .gap-zone:hover { border-color: var(--accent); }
  .gap-zone-brands { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .gap-zone-brand { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; color: #fff; }
  /* 카카오 순수 DOM 툴팁 */
  #kakao-float-tooltip {
    position: absolute; z-index: 9999; pointer-events: none; display: none;
    padding: 6px 12px; font-size: 13px; font-weight: 600; white-space: nowrap;
    background: #1e222d; color: #e8eaf0; border: 1px solid #2a2f3d;
    border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    font-family: 'Noto Sans KR', sans-serif; transform: translate(-50%, -100%);
    margin-top: -42px;
  }
  .selected-label {
    padding: 4px 10px; font-size: 12px; font-weight: 700; white-space: nowrap;
    background: #1e222d; color: #e8eaf0; border: 2px solid; border-radius: 5px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5); font-family: 'Noto Sans KR', sans-serif;
    text-align: center; position: relative;
  }
  .selected-label::after {
    content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
    border-left: 5px solid transparent; border-right: 5px solid transparent;
    border-top: 6px solid #1e222d;
  }
  /* Leaflet 다크모드 */
  .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }

  .leaflet-control-attribution { display: none; }
  .custom-tooltip {
    background: #1e222d !important; color: #e8eaf0 !important; border: 1px solid #2a2f3d !important;

    font-family: 'Noto Sans KR', sans-serif !important; box-shadow: 0 2px 8px rgba(0,0,0,0.4) !important;

<body>

<header>
  <div class="header-left">
    <div class="logo-mark">IL</div>
    <div>
      <div class="header-title">일룸 유통망 + 경쟁사 <span class="map-engine-badge" id="engineBadge">loading...</span></div>
      <div class="header-sub">오프라인 매장 현황</div>
    </div>
  </div>
  <div class="header-tabs">
    <button class="header-tab active" onclick="switchView('map')">유통망 지도</button>
    <button class="header-tab" onclick="switchView('gap')">공백 분석</button>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-value" id="totalCount">-</div>
      <div class="stat-label">전체 매장</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="filteredCount">-</div>
      <div class="stat-label">표시 중</div>
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="search-box">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="매장명 또는 주소 검색...">
      </div>
      <div class="brand-filters" id="brandFilters"></div>
      <div class="region-filters" id="regionFilters"></div>
      <div class="store-count">총 <span id="sidebarCount">0</span>개 매장</div>
    </div>
    <div class="store-list" id="storeList"></div>
  </div>

  <!-- 공백 분석 사이드바 -->
  <div class="sidebar" id="gapSidebar" style="display:none;">
    <div class="sidebar-header">
      <div style="font-size:15px;font-weight:700;margin-bottom:10px;">커버리지 공백 분석</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">일룸 커버리지 밖 경쟁사 매장</div>
      <div style="display:flex;gap:4px;margin-bottom:14px;">
        <button class="gap-sub-tab active" onclick="switchGapMode('national')">전국</button>
        <button class="gap-sub-tab" onclick="switchGapMode('metro')">수도권</button>
      </div>
      <div id="gapFilterNational">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <span style="font-size:11px;color:var(--text-muted);">커버리지 반경</span>
          <button class="gap-radius-btn" onclick="setCoverageRadius(10)">10km</button>
          <button class="gap-radius-btn active" onclick="setCoverageRadius(15)">15km</button>
          <button class="gap-radius-btn" onclick="setCoverageRadius(20)">20km</button>
        </div>
      </div>
      <div id="gapFilterMetro" style="display:none;">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <span style="font-size:11px;color:var(--text-muted);">커버리지 반경</span>
          <button class="gap-radius-btn-metro active" onclick="setCoverageRadius(1)">1km</button>
          <button class="gap-radius-btn-metro" onclick="setCoverageRadius(2)">2km</button>
          <button class="gap-radius-btn-metro" onclick="setCoverageRadius(3)">3km</button>
          <button class="gap-radius-btn-metro" onclick="setCoverageRadius(5)">5km</button>
        </div>
      </div>
      <div id="gapSummary" style="margin-top:12px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;"></div>
    </div>
    <div class="store-list" id="gapResults" style="font-size:12px;"></div>
  </div>

  <!-- 지역 대시보드 (map-container 옆) -->
  <div class="region-dashboard" id="regionDashboard">
    <button class="region-dashboard-close" onclick="closeRegionDashboard()">&#10005;</button>
    <div id="regionDashboardContent"></div>
  </div>

  <div class="map-container" style="position:relative;">
    <div id="map"></div>
    <div id="kakao-float-tooltip"></div>
    <!-- 툴바: 비교모드 + 내보내기 -->
    <div class="map-toolbar">
      <button class="toolbar-btn" id="btnCompareMode" onclick="toggleCompareMode()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        비교
      </button>
      <button class="toolbar-btn" id="btnHeatmap" onclick="toggleHeatmap()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        히트맵
      </button>
      <button class="toolbar-btn" id="btnSales" onclick="toggleSalesDashboard()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        지역 현황
      </button>
      <button class="toolbar-btn" id="btnShipment" onclick="toggleShipment()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10m10 0H3m10 0h2m0 0a1 1 0 011-1V8h2.586a1 1 0 01.707.293l2.414 2.414a1 1 0 01.293.707V15a1 1 0 01-1 1h-1"/></svg>
        출고지
      </button>
    </div>
    <!-- 비교 모드 바 -->
    <div class="compare-bar" id="compareBar">
      <div class="compare-text">매장 <span id="compareCount">0</span>/6 선택</div>
      <button class="btn-compare" id="btnRunCompare" onclick="runCompare()" disabled>비교하기</button>
      <button class="btn-cancel" onclick="toggleCompareMode()">취소</button>
    </div>
    <!-- 비교 결과 패널 -->
    <div class="compare-panel" id="comparePanel">
      <button class="info-panel-close" onclick="closeCompare()">&#10005;</button>
      <div id="compareContent"></div>
    </div>
    <!-- 히트맵 범례 -->
    <div class="heatmap-legend" id="heatmapLegend">
      <div class="legend-title">매출 히트맵</div>
      <div class="legend-row"><div class="legend-circle" style="width:18px;height:18px;background:rgba(232,70,58,0.5);"></div> 상위 (20억+)</div>
      <div class="legend-row"><div class="legend-circle" style="width:14px;height:14px;background:rgba(232,70,58,0.3);"></div> 중상 (10~20억)</div>
      <div class="legend-row"><div class="legend-circle" style="width:10px;height:10px;background:rgba(232,70,58,0.2);"></div> 중위 (5~10억)</div>
      <div class="legend-row"><div class="legend-circle" style="width:8px;height:8px;background:rgba(232,70,58,0.1);"></div> 하위 (~5억)</div>
    </div>
    <div class="info-panel" id="infoPanel">
      <button class="info-panel-close panel-close-below" onclick="closePanel()">&#10005;</button>
      <div class="info-panel-tag" id="panelTag">일룸 대리점</div>
      <div class="info-panel-name" id="panelName">-</div>
      <div class="info-panel-addr" id="panelAddr">-</div>
      <div class="radius-slider-wrap">
        <label>반경</label>
        <input type="range" id="radiusSlider" min="1" max="20" value="5" step="1" oninput="updateRadius(this.value)">
        <span class="radius-val" id="radiusVal">5km</span>
      </div>
      <div id="panelSalesSection"></div>
      <div id="panelCompetitorSection"></div>
    </div>
  </div>
</div>

function displayName(store) {
  var n = store.name;
  if (store.brand === '일룸') {
    n = n.replace(/\d+$/, '');
    if (!/점/.test(n)) n += '점';
  }
  if (n.indexOf(store.brand) === 0) n = n.substring(store.brand.length).replace(/^\s+/, '');
  return n;
}

function getRegion(addr) {
  if (addr.indexOf('서울') === 0) return '서울';
  if (addr.indexOf('인천') === 0) return '인천';
  if (addr.indexOf('경기') === 0) return '경기';
  if (addr.indexOf('대전') === 0) return '대전';
  if (addr.indexOf('충청북도') === 0 || addr.indexOf('충북') === 0) return '충북';
  if (addr.indexOf('세종') === 0) return '충남';
  if (addr.indexOf('충청남도') === 0 || addr.indexOf('충남') === 0) return '충남';
  if (addr.indexOf('대구') === 0) return '대구';
  if (addr.indexOf('경상북도') === 0 || addr.indexOf('경북') === 0) return '경북';
  if (addr.indexOf('경상남도') === 0 || addr.indexOf('경남') === 0) return '경남';
  if (addr.indexOf('부산') === 0) return '부산';
  if (addr.indexOf('울산') === 0) return '울산';
  if (addr.indexOf('광주') === 0) return '광주';
  if (addr.indexOf('전라북도') === 0 || addr.indexOf('전북') === 0) return '전북';
  if (addr.indexOf('전라남도') === 0 || addr.indexOf('전남') === 0) return '전남';
  if (addr.indexOf('강원') === 0) return '강원';
  if (addr.indexOf('제주') === 0) return '제주';
  return '기타';
}

function makeMarkerSvg(color) {
  return '<svg width="24" height="30" viewBox="0 0 24 30"><path d="M12 0C5.37 0 0 5.37 0 12c0 7.73 12 18 12 18S24 19.73 24 12C24 5.37 18.63 0 12 0z" fill="' + color + '"/><circle cx="12" cy="12" r="4.5" fill="white" opacity="0.9"/></svg>';
}

// Canvas로 PNG 마커 이미지 생성 (카카오용)
var _markerPngCache = {};
function makeMarkerPng(color) {
  if (_markerPngCache[color]) return _markerPngCache[color];
  var w = 28, h = 36;
  var c = document.createElement('canvas'); c.width = w; c.height = h;
  var ctx = c.getContext('2d');
  // 핀 모양
  ctx.beginPath();
  ctx.moveTo(w/2, h);
  ctx.bezierCurveTo(w/2, h, 0, h*0.6, 0, w/2);
  ctx.arc(w/2, w/2, w/2, Math.PI, 0, false);
  ctx.bezierCurveTo(w, h*0.6, w/2, h, w/2, h);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // 중앙 흰 점
  ctx.beginPath();
  ctx.arc(w/2, w/2, 5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();
  _markerPngCache[color] = c.toDataURL('image/png');
  return _markerPngCache[color];
}

function makeLeafletIcon(brand) {
  var color = BRAND_COLORS[brand] || '#ff6b35';
  return L.divIcon({
    className: '',
    html: makeMarkerSvg(color),
    iconSize: [24, 30], iconAnchor: [12, 30], tooltipAnchor: [0, -30],
  });
}

// ══════════════════════════════════════════
// 같은 위치 마커 오프셋 처리
// ══════════════════════════════════════════
function offsetOverlappingStores() {
  var coordMap = {};
  allStores.forEach(function(s) {
    var key = s.lat.toFixed(4) + ',' + s.lng.toFixed(4);
    if (!coordMap[key]) coordMap[key] = [];
    coordMap[key].push(s);
  });
  Object.keys(coordMap).forEach(function(key) {
    var group = coordMap[key];
    if (group.length <= 1) return;
    var angleStep = (2 * Math.PI) / group.length;
    var offset = 0.0003; // ~30m
    group.forEach(function(s, i) {
      s.lat = s.lat + offset * Math.cos(angleStep * i);
      s.lng = s.lng + offset * Math.sin(angleStep * i);
    });
  });
}

function tryKakao() {
  try {
    if (typeof kakao === 'undefined' || !kakao.maps) return false;
    kakao.maps.load(function() {
      mapEngine = 'kakao';
      document.getElementById('engineBadge').textContent = 'Kakao Maps';
      var container = document.getElementById('map');
      mapObj = new kakao.maps.Map(container, {
        center: new kakao.maps.LatLng(36.5, 127.8),
        level: 12
      });
      var markerImages = {};
      Object.keys(BRAND_COLORS).forEach(function(b) {
        var png = makeMarkerPng(BRAND_COLORS[b]);
        markerImages[b] = new kakao.maps.MarkerImage(png, new kakao.maps.Size(28, 36), { offset: new kakao.maps.Point(14, 36) });
      });
      var floatTip = document.getElementById('kakao-float-tooltip');
      allStores.forEach(function(store) {
        var pos = new kakao.maps.LatLng(store.lat, store.lng);
        var img = markerImages[store.brand] || markerImages['일룸'];
        var zMap = {'일룸':10,'한샘':8,'리바트':6,'까사미아':4,'에몬스':2};
        var marker = new kakao.maps.Marker({ position: pos, map: mapObj, image: img, clickable: true, zIndex: zMap[store.brand]||1 });
        kakao.maps.event.addListener(marker, 'click', function() {
          if (compareMode) toggleCompare(store.id);
          else selectStore(store.id);
        });
        var bc = BRAND_COLORS[store.brand] || '#e8463a';
        kakao.maps.event.addListener(marker, 'mouseover', function() {
          if (activeStoreId === store.id) return;
          floatTip.innerHTML = '<span style="color:' + bc + ';">' + store.brand + '</span> ' + displayName(store);
          var proj = mapObj.getProjection();
          var point = proj.containerPointFromCoords(pos);
          floatTip.style.left = point.x + 'px';
          floatTip.style.top = point.y + 'px';
          floatTip.style.display = 'block';
        });
        kakao.maps.event.addListener(marker, 'mouseout', function() { floatTip.style.display = 'none'; });
        store.marker = marker;
        store._pos = pos;
      });
      renderStoreList();
    });
    return true;
  } catch(e) {
    return false;
  }
}

function initLeaflet() {

    var marker = L.marker([store.lat, store.lng], { icon: icon, zIndexOffset: zMap[store.brand]||100 }).addTo(mapObj);
    var brandColor = BRAND_COLORS[store.brand] || '#ff6b35';

var districtPolygons = [];
function clearDistrictBoundaries() {
  districtPolygons.forEach(function(p) {
    if (mapEngine === 'kakao') p.setMap(null);
    else if (mapEngine === 'leaflet' && mapObj) mapObj.removeLayer(p);
  });
  districtPolygons = [];
}

function drawDistrictBoundaries(region) {
  clearDistrictBoundaries();
  if (region === '전체' || typeof DISTRICT_BOUNDARIES === 'undefined') return;
  var districts = DISTRICT_BOUNDARIES.filter(function(d) { return d.sido === region; });
  if (districts.length === 0) { console.warn('경계 데이터 없음:', region); return; }
  console.log('경계 그리기:', region, districts.length + '개');

  districts.forEach(function(d) {
    var polys = d.type === 'MultiPolygon' ? d.coords : [d.coords];
    polys.forEach(function(poly) {
      var outer = poly[0];
      if (!outer || outer.length < 3) return;
      if (mapEngine === 'kakao' && mapObj) {
        var path = outer.map(function(c) { return new kakao.maps.LatLng(c[1], c[0]); });
        var polygon = new kakao.maps.Polygon({
          map: mapObj,
          path: path,
          strokeWeight: 3,
          strokeColor: '#1d4ed8',
          strokeOpacity: 1,
          strokeStyle: 'solid',
          fillColor: '#3b82f6',
          fillOpacity: 0.2
        });
        districtPolygons.push(polygon);
      } else if (mapEngine === 'leaflet' && mapObj) {
        var latlngs = outer.map(function(c) { return [c[1], c[0]]; });
        var polygon = L.polygon(latlngs, {
          color: '#1d4ed8', weight: 3, opacity: 1,
          fillColor: '#3b82f6', fillOpacity: 0.2
        }).addTo(mapObj);
        districtPolygons.push(polygon);
      }
    });
  });
  console.log('생성된 폴리곤:', districtPolygons.length);
}

function setFilter(region) {
  activeFilter = region;
  document.querySelectorAll('.region-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.textContent === region);
  });
  renderStoreList();
  updateMarkers();
  drawDistrictBoundaries(region);
  if (document.getElementById('regionDashboard').classList.contains('visible')) {
    showRegionDashboard(region);
  }
  // 해당 지역으로 지도 이동: 시도 경계 폴리곤의 bounding box 우선 사용
  if (region === '전체') {
    if (mapEngine === 'kakao' && mapObj) { mapObj.setCenter(new kakao.maps.LatLng(36.5, 127.8)); mapObj.setLevel(12); }
    else if (mapEngine === 'leaflet' && mapObj) { mapObj.setView([36.5, 127.8], 7, { animate: true }); }
  } else {
    var minLat=90,maxLat=-90,minLng=180,maxLng=-180;
    var found = false;
    // 1순위: 경계 폴리곤 좌표로 bbox
    if (typeof DISTRICT_BOUNDARIES !== 'undefined') {
      var sidoBoundaries = DISTRICT_BOUNDARIES.filter(function(d) { return d.sido === region; });
      sidoBoundaries.forEach(function(d) {
        var polys = d.type === 'MultiPolygon' ? d.coords : [d.coords];
        polys.forEach(function(poly) {
          var outer = poly[0];
          if (!outer) return;
          outer.forEach(function(c) {
            var lng = c[0], lat = c[1];
            if (lat < minLat) minLat = lat;
            if (lat > maxLat) maxLat = lat;
            if (lng < minLng) minLng = lng;
            if (lng > maxLng) maxLng = lng;
            found = true;
          });
        });
      });
    }
    // 2순위: 매장 좌표로 bbox
    if (!found) {
      var filtered = getFilteredStores();
      filtered.forEach(function(s) {
        if (s.lat < minLat) minLat = s.lat;
        if (s.lat > maxLat) maxLat = s.lat;
        if (s.lng < minLng) minLng = s.lng;
        if (s.lng > maxLng) maxLng = s.lng;
        found = true;
      });
    }
    if (found) {
      // 패널 열려있으면 좌측 패딩 더 크게
      var dashOpen = document.getElementById('regionDashboard').classList.contains('visible');
      var pad = dashOpen ? 60 : 80;
      if (mapEngine === 'kakao' && mapObj) {
        var bounds = new kakao.maps.LatLngBounds(new kakao.maps.LatLng(minLat, minLng), new kakao.maps.LatLng(maxLat, maxLng));
        mapObj.setBounds(bounds, pad, pad, pad, pad);
      } else if (mapEngine === 'leaflet' && mapObj) {
        mapObj.fitBounds([[minLat, minLng], [maxLat, maxLng]], { padding: [pad, pad], animate: true });
      }
    }
  }
}

// ══════════════════════════════════════════
// 필터링 + 목록 + 마커
// ══════════════════════════════════════════
function getFilteredStores() {
  var query = document.getElementById('searchInput').value.toLowerCase();
  return allStores.filter(function(s) {
    var matchBrand = activeBrands[s.brand];
    var matchRegion = activeFilter === '전체' || s.region === activeFilter;
    var matchSearch = !query || s.name.toLowerCase().indexOf(query) !== -1 || s.addr.toLowerCase().indexOf(query) !== -1 || s.brand.toLowerCase().indexOf(query) !== -1 || (s.place_name && s.place_name.toLowerCase().indexOf(query) !== -1) || displayName(s).toLowerCase().indexOf(query) !== -1;
    return matchBrand && matchRegion && matchSearch;
  });
}

function renderStoreList() {
  var filtered = getFilteredStores();
  var list = document.getElementById('storeList');
  document.getElementById('sidebarCount').textContent = filtered.length;
  document.getElementById('filteredCount').textContent = filtered.length;
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">검색 결과가 없습니다</div>';
    return;
  }
  list.innerHTML = filtered.map(function(s, idx) {
    var dotColor = BRAND_COLORS[s.brand] || '#ff6b35';
    var checkHtml = compareMode ? '<div class="compare-check ' + (compareList.indexOf(s.id) !== -1 ? 'checked' : '') + '" onclick="event.stopPropagation();toggleCompare(' + s.id + ')">&#10003;</div>' : '';
    return '<div class="store-item ' + (s.id === activeStoreId ? 'active' : '') + '" onclick="' + (compareMode ? 'toggleCompare(' + s.id + ')' : 'selectStore(' + s.id + ')') + '">' +
      checkHtml +
      '<div class="store-brand-dot" style="background:' + dotColor + '"></div>' +
      '<div class="store-info"><div class="store-name">' + s.brand + ' ' + displayName(s) + (s.stype ? '<span class="stype-tag ' + (s.stype === '직영' ? 'direct' : 'dealer') + '">' + s.stype + '</span>' : '') + '</div><div class="store-addr">' + s.addr + '</div></div>' +
      '<div class="store-region-tag">' + s.region + '</div></div>';
  }).join('');
}

function updateMarkers() {
  var filtered = getFilteredStores();
  var filteredIds = {};
  filtered.forEach(function(s) { filteredIds[s.id] = true; });

  if (mapEngine === 'kakao') {
    allStores.forEach(function(s) {
      if (s.marker) s.marker.setMap(filteredIds[s.id] ? mapObj : null);
    });
  } else {
    allStores.forEach(function(s) {
      if (!s.marker) return;
      if (filteredIds[s.id]) { if (!mapObj.hasLayer(s.marker)) s.marker.addTo(mapObj); }
      else { mapObj.removeLayer(s.marker); }
    });
  }
  // 히트맵이 켜져 있으면 필터 반영하여 다시 그리기
  if (heatmapActive) { clearHeatmap(); drawHeatmap(); }
}

// 매출 데이터 매칭 + 거리 계산
// ══════════════════════════════════════════
function findSalesData(brand, storeName) {
  if (typeof SALES_DATA === 'undefined') return null;
  // 정확한 이름 매칭
  var match = SALES_DATA.find(function(d) { return d.brand === brand && d.store === storeName; });
  if (match) return match;
  // 부분 매칭
  match = SALES_DATA.find(function(d) { return d.brand === brand && (d.store.indexOf(storeName) !== -1 || storeName.indexOf(d.store) !== -1); });
  return match || null;
}

function calcDistance(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatSales(val) {
  if (!val || val === 0) return '-';
  var eok = val / 100000000;
  if (eok >= 1) return eok.toFixed(1) + '억';
  var man = val / 10000;
  return Math.round(man).toLocaleString() + '만';
}

function findNearbyCompetitors(store, radiusKm) {
  var nearby = [];
  allStores.forEach(function(s) {
    if (s.id === store.id) return;
    if (s.brand === store.brand) return;
    var dist = calcDistance(store.lat, store.lng, s.lat, s.lng);
    if (dist <= radiusKm) {
      var sales = findSalesData(s.brand, s.name);
      nearby.push({ store: s, dist: dist, sales: sales });
    }
  });
  nearby.sort(function(a, b) {
    var sa = (a.sales && a.sales.s25) ? a.sales.s25 : 0;
    var sb = (b.sales && b.sales.s25) ? b.sales.s25 : 0;
    return sb - sa;
  });
  return nearby;
}

function selectStore(id) {

      '<div class="sales-card">' +
      '<div class="sales-row"><span class="sales-label">2025 연누계</span><span class="sales-value">' + formatSales(mySales.s25) + '</span></div>' +
      '<div class="sales-row"><span class="sales-label">2024 연누계</span><span class="sales-value" style="color:var(--text-muted);font-size:12px;">' + formatSales(mySales.s24) + '</span></div>' +
      '<div class="sales-row"><span class="sales-label">전년 대비</span><span class="sales-change ' + changeClass + '">' + changeSign + changePct + '%</span></div>' +
      '<div class="sales-row"><span class="sales-label">전국 순위</span><span class="rank-badge" style="color:' + rankColor + ';">' + mySales.r25 + '위 <span style="font-size:10px;">' + rankArrow + '</span></span></div>' +
      '</div></div>';
  }
  document.getElementById('panelSalesSection').innerHTML = salesHtml;

  // 반경 슬라이더 값 반영
  document.getElementById('radiusSlider').value = currentRadius;
  document.getElementById('radiusVal').textContent = currentRadius + 'km';

  // 근접 경쟁사
  var nearby = findNearbyCompetitors(store, currentRadius);
  var compHtml = '';
  if (nearby.length > 0) {
    // 매출 바 차트 데이터 (선택된 매장 포함)
    var barData = [];
    if (mySales) {
      barData.push({ brand: store.brand, name: store.name, sales: mySales.s25, color: BRAND_COLORS[store.brand] });
    }
    nearby.forEach(function(n) {
      if (n.sales && n.sales.s25 > 0) {
        barData.push({ brand: n.store.brand, name: n.store.name, sales: n.sales.s25, color: BRAND_COLORS[n.store.brand], dist: n.dist });
      }
    });
    barData.sort(function(a, b) { return b.sales - a.sales; });
    var maxSales = barData.length > 0 ? barData[0].sales : 1;

    // 바 차트
    var barHtml = '';
    if (barData.length > 1) {
      barHtml = '<div class="panel-section"><div class="panel-section-title">반경 ' + currentRadius + 'km 매출 비교</div><div class="bar-chart">';
      barData.slice(0, 8).forEach(function(d) {
        var pct = Math.max(5, (d.sales / maxSales) * 100);
        barHtml += '<div class="bar-row">' +
          '<div class="bar-label">' + d.brand + '</div>' +
          '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + d.color + ';"><span class="bar-value">' + formatSales(d.sales) + '</span></div></div></div>';
      });
      barHtml += '</div></div>';
    }

    // 경쟁사 리스트 (최대 10개)
    compHtml = '<div class="panel-section"><div class="panel-section-title">근접 경쟁사 (' + nearby.length + ')</div>';
    nearby.slice(0, 10).forEach(function(n) {
      var distStr = n.dist < 1 ? Math.round(n.dist * 1000) + 'm' : n.dist.toFixed(1) + 'km';

      compHtml += '<div class="competitor-row">' +
        '<div class="brand-dot" style="background:' + (BRAND_COLORS[n.store.brand] || '#888') + ';"></div>' +
        '<div class="comp-info"><div class="comp-name">' + n.store.brand + ' ' + displayName(n.store) + '</div><div class="comp-dist">' + distStr + '</div></div>' +
        (salesStr ? '<div class="comp-sales">' + salesStr + '</div>' : '') +
        '</div>';
    });
    compHtml += '</div>';
    compHtml = barHtml + compHtml;
  } else {
    compHtml = '<div class="panel-section"><div class="panel-section-title">근접 경쟁사</div><div style="font-size:11px;color:var(--text-dim);text-align:center;padding:12px;">반경 ' + currentRadius + 'km 내 경쟁사 없음</div></div>';
  }
  document.getElementById('panelCompetitorSection').innerHTML = compHtml;

  document.getElementById('infoPanel').classList.add('visible');

  // 기존 반경 원/라벨 제거
  removeRadiusCircle();
  removeSelectedLabel();

  var brandColor = BRAND_COLORS[store.brand] || '#e8463a';
  var labelText = store.brand + ' ' + displayName(store);

  if (mapEngine === 'kakao' && mapObj) {
    mapObj.setCenter(new kakao.maps.LatLng(store.lat, store.lng));
    mapObj.setLevel(3);
    // 매장명 라벨
    var labelContent = '<div class="selected-label" style="border-color:' + brandColor + ';">' +
      '<span style="color:' + brandColor + ';">' + store.brand + '</span> ' + displayName(store) + '</div>';
    selectedLabel = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(store.lat, store.lng),
      content: labelContent,
      yAnchor: 2.4,
      map: mapObj
    });
    // 카카오 반경 원
    radiusCircle = new kakao.maps.Circle({
      center: new kakao.maps.LatLng(store.lat, store.lng),
      radius: currentRadius * 1000,
      strokeWeight: 2,
      strokeColor: '#e8463a',
      strokeOpacity: 0.6,
      strokeStyle: 'dash',
      fillColor: '#e8463a',
      fillOpacity: 0.08,
      map: mapObj
    });
  } else if (mapEngine === 'leaflet' && mapObj) {
    mapObj.setView([store.lat, store.lng], 16, { animate: true });
    // 매장명 라벨
    selectedLabel = L.tooltip({ permanent: true, direction: 'top', className: 'selected-label-leaflet', offset: [0, -20] })
      .setLatLng([store.lat, store.lng])
      .setContent('<span style="color:' + brandColor + ';font-weight:700;">' + store.brand + '</span> ' + displayName(store))
      .addTo(mapObj);
    // Leaflet 반경 원
    radiusCircle = L.circle([store.lat, store.lng], {
      radius: currentRadius * 1000,
      color: '#e8463a',
      weight: 2,
      opacity: 0.6,
      dashArray: '8,6',
      fillColor: '#e8463a',
      fillOpacity: 0.08
    }).addTo(mapObj);
  }

  var el = document.querySelector('.store-item.active');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function removeSelectedLabel() {
  if (!selectedLabel) return;
  if (mapEngine === 'kakao') selectedLabel.setMap(null);
  else if (mapEngine === 'leaflet' && mapObj) mapObj.removeLayer(selectedLabel);
  selectedLabel = null;
}

function removeRadiusCircle() {
  if (!radiusCircle) return;
  if (mapEngine === 'kakao') radiusCircle.setMap(null);
  else if (mapEngine === 'leaflet' && mapObj) mapObj.removeLayer(radiusCircle);
  radiusCircle = null;
}

function closePanel() {
  document.getElementById('infoPanel').classList.remove('visible');
  removeRadiusCircle();
  removeSelectedLabel();
  activeStoreId = null;
  renderStoreList();
}

function toggleCompareMode() {
  compareMode = !compareMode;
  compareList = [];
  document.getElementById('btnCompareMode').classList.toggle('active', compareMode);
  document.getElementById('compareBar').classList.toggle('visible', compareMode);
  document.getElementById('compareCount').textContent = '0';
  document.getElementById('btnRunCompare').disabled = true;
  closeCompare();
  if (!compareMode) closePanel();
  renderStoreList();
}

function toggleCompare(id) {
  var idx = compareList.indexOf(id);
  if (idx !== -1) {
    compareList.splice(idx, 1);
  } else {
    if (compareList.length >= 6) return;
    compareList.push(id);
  }
  document.getElementById('compareCount').textContent = compareList.length;
  document.getElementById('btnRunCompare').disabled = compareList.length < 2;
  renderStoreList();
}

function runCompare() {
  if (compareList.length < 2) return;
  var stores = compareList.map(function(id) {
    return allStores.find(function(s) { return s.id === id; });
  }).filter(Boolean);

  var rows = stores.map(function(s) {
    var sales = findSalesData(s.brand, s.name);
    return { store: s, sales: sales };
  });

  var html = '<div style="font-size:16px;font-weight:700;margin-bottom:18px;letter-spacing:-0.3px;">매장 비교</div>';

  // 카드형 레이아웃 (매장별)
  rows.forEach(function(r, idx) {
    var brandColor = BRAND_COLORS[r.store.brand] || '#ff6b35';
    var s25 = r.sales ? formatSales(r.sales.s25) : '-';
    var s24 = r.sales ? formatSales(r.sales.s24) : '-';
    var change = '-';
    var changeStyle = 'color:var(--text-dim)';
    if (r.sales && r.sales.s24 > 0) {
      var pct = ((r.sales.s25 - r.sales.s24) / r.sales.s24 * 100).toFixed(1);
      var isUp = pct >= 0;
      change = (isUp ? '+' : '') + pct + '%';
      changeStyle = 'color:' + (isUp ? '#34d399' : '#f87171');
    }
    var rank = r.sales ? r.sales.r25 + '위' : '-';
    var stype = r.store.stype ? '<span class="stype-tag ' + (r.store.stype === '직영' ? 'direct' : 'dealer') + '" style="font-size:10px;padding:1px 5px;margin-left:4px;">' + r.store.stype + '</span>' : '';

    html += '<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid ' + brandColor + ';border-radius:8px;padding:14px;margin-bottom:10px;">' +
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">' +
        '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + brandColor + ';flex-shrink:0;"></span>' +
        '<span style="font-weight:600;font-size:13px;">' + r.store.brand + ' ' + displayName(r.store) + stype + '</span>' +
        '<span style="margin-left:auto;font-size:11px;color:var(--text-muted);">' + r.store.region + '</span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:11px;">' +
        '<div><div style="color:var(--text-dim);margin-bottom:2px;">2025 매출</div><div style="font-size:15px;font-weight:700;">' + s25 + '</div></div>' +
        '<div><div style="color:var(--text-dim);margin-bottom:2px;">전년비</div><div style="font-size:15px;font-weight:700;' + changeStyle + '">' + change + '</div></div>' +
        '<div><div style="color:var(--text-dim);margin-bottom:2px;">전국순위</div><div style="font-size:15px;font-weight:700;">' + rank + '</div></div>' +
      '</div>' +
    '</div>';
  });

  // 매출 비교 바 차트
  var barData = rows.filter(function(r) { return r.sales && r.sales.s25 > 0; });
  if (barData.length > 0) {
    var maxVal = Math.max.apply(null, barData.map(function(r) { return r.sales.s25; }));
    html += '<div style="margin-top:8px;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;">' +
      '<div style="font-size:12px;font-weight:600;margin-bottom:12px;color:var(--text-muted);">2025 매출 비교</div>';
    barData.forEach(function(r) {
      var pct = Math.max(5, (r.sales.s25 / maxVal) * 100);
      var color = BRAND_COLORS[r.store.brand];
      html += '<div class="bar-row"><div class="bar-label">' + r.store.brand + ' ' + displayName(r.store) + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + color + ';"><span class="bar-value">' + formatSales(r.sales.s25) + '</span></div></div></div>';
    });
    html += '</div>';
  }

  document.getElementById('compareContent').innerHTML = html;
  document.getElementById('comparePanel').classList.add('visible');
  document.getElementById('infoPanel').classList.remove('visible');
}

function showRegionDashboard(region) {
  var isAll = (region === '전체');
  var brands = ['일룸','한샘','리바트','까사미아','에몬스'];
  var data = {};

  allStores.forEach(function(s) {
    if (!isAll && s.region !== region) return;
    if (!data[s.brand]) return;
    data[s.brand].count++;
    var sales = findSalesData(s.brand, s.name);
    if (sales) {
      if (sales.s25 > 0) data[s.brand].s25 += sales.s25;
      if (sales.s24 > 0) data[s.brand].s24 += sales.s24;
    }
  });

  var totalStores = 0, totalS24 = 0, totalS25 = 0;
  brands.forEach(function(b) {
    totalStores += data[b].count;
    totalS24 += data[b].s24;
    totalS25 += data[b].s25;
  });
  var maxSales = Math.max.apply(null, brands.map(function(b) { return data[b].s25; }));

  // 매장당 매출 효율 계산 + 랭킹
  var perStoreSales = {};
  brands.forEach(function(b) {
    perStoreSales[b] = (data[b].count > 0 && data[b].s25 > 0) ? data[b].s25 / data[b].count : 0;
  });
  var efficiencyRank = brands.slice().filter(function(b){return perStoreSales[b]>0;}).sort(function(a, b) {
    return perStoreSales[b] - perStoreSales[a];
  });

  var title = isAll ? '전국 브랜드 현황' : region + ' 지역 현황';

  // 인구통계 계산
  var popTotal = 0, hhTotal = 0;
  if (typeof POPULATION_DATA !== 'undefined') {

      Object.keys(POPULATION_DATA).forEach(function(r) {
        popTotal += POPULATION_DATA[r].pop;
        hhTotal += POPULATION_DATA[r].household;

  var formatPop = function(n) {

  var html = '<div class="rd-header">' + title + '</div>';

    html += '<div class="rd-pop-line">인구 <strong>' + formatPop(popTotal) + '명</strong> · 세대 <strong>' + formatPop(hhTotal) + '</strong></div>';
  } else {
    html += '<div style="margin-bottom:14px;"></div>';

  html += '<div class="rd-grid">';

  var totalChangeSign = totalS25 >= totalS24 ? '+' : '';
  html += '<div class="rd-card" style="border-color:var(--border);">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;">' +
      '<div style="font-size:15px;font-weight:700;color:#e2e8f0;">전체</div>' +
      '<div style="font-size:28px;font-weight:700;font-family:DM Mono,monospace;color:#fff;">' + totalStores + '<span style="font-size:13px;font-weight:400;color:#cbd5e1;">개</span></div>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">' +
      '<div style="font-size:13px;color:#cbd5e1;">\'24 <span style="color:#e2e8f0;">' + (totalS24 > 0 ? formatSales(totalS24) : '-') + '</span></div>' +
      '<div style="font-size:17px;font-weight:600;color:#fff;">\'25 ' + (totalS25 > 0 ? formatSales(totalS25) : '-') + '</div>' +
    '</div>' +
    (totalS24 > 0 ? '<div style="text-align:right;font-size:13px;font-weight:600;margin-top:3px;' + totalChangeStyle + '">' + totalChangeSign + totalChange + '% YoY</div>' : '') +
    '</div>';

  // 브랜드별 카드 (클릭 시 매장별 상세)
  brands.forEach(function(b) {
    var d = data[b];
    var bc = BRAND_COLORS[b];

    var share = totalS25 > 0 ? (d.s25 / totalS25 * 100).toFixed(1) : 0;

        '<div style="font-size:17px;font-weight:700;color:' + bc + ';">' + b + ' <span style="font-size:12px;color:#fff;">▼</span></div>' +
        '<div style="font-size:28px;font-weight:700;font-family:DM Mono,monospace;color:#fff;">' + d.count + '<span style="font-size:13px;font-weight:400;color:#cbd5e1;">개</span></div>' +
      '</div>' +
      // 매출

function toggleBrandDetail(brand, region) {
  var area = document.getElementById('brandDetailArea');
  // 같은 브랜드 다시 클릭하면 닫기
  if (area.dataset.brand === brand) { area.innerHTML = ''; area.dataset.brand = ''; return; }
  area.dataset.brand = brand;

  var isAll = (region === '전체');
  var bc = BRAND_COLORS[brand] || '#888';

  // 해당 브랜드 매장 + 매출 수집
  var storeList = [];
  allStores.forEach(function(s) {
    if (s.brand !== brand) return;
    if (!isAll && s.region !== region) return;
    var sales = findSalesData(s.brand, s.name);
    storeList.push({ store: s, sales: sales });
  });

  // 25년 매출 기준 정렬
  storeList.sort(function(a, b) {
    var sa = (a.sales && a.sales.s25 > 0) ? a.sales.s25 : 0;
    var sb = (b.sales && b.sales.s25 > 0) ? b.sales.s25 : 0;
    return sb - sa;
  });

  var maxS25 = storeList.length > 0 && storeList[0].sales ? storeList[0].sales.s25 : 1;

  var html = '<div style="margin-top:14px;padding:18px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;max-height:520px;overflow-y:auto;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">' +
      '<span style="font-size:16px;font-weight:700;color:' + bc + ';">' + brand + ' 매장별 매출</span>' +
      '<span style="font-size:13px;color:#cbd5e1;">' + storeList.length + '개 매장</span>' +
    '</div>';

  storeList.forEach(function(r, idx) {
    var s25 = (r.sales && r.sales.s25 > 0) ? r.sales.s25 : 0;
    var s24 = (r.sales && r.sales.s24 > 0) ? r.sales.s24 : 0;
    var changePct = s24 > 0 ? ((s25 - s24) / s24 * 100).toFixed(1) : '-';
    var changeColor = '#94a3b8';
    var changeSign = '';
    if (changePct !== '-') {
      changeColor = parseFloat(changePct) >= 0 ? '#34d399' : '#f87171';
      changeSign = parseFloat(changePct) >= 0 ? '+' : '';
    }
    var barW = maxS25 > 0 ? (s25 / maxS25 * 100) : 0;

    html += '<div style="padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="selectStore(' + r.store.id + ')">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<span style="font-size:14px;color:#fff;font-weight:600;">' + displayName(r.store) + '</span>' +
        '<span style="font-size:13px;font-weight:700;color:' + changeColor + ';">' + (changePct !== '-' ? changeSign + changePct + '%' : '') + '</span>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">' +
        '<span style="font-size:12px;color:#cbd5e1;font-family:DM Mono,monospace;">\'24 ' + (s24 > 0 ? formatSales(s24) : '-') + '</span>' +
        '<span style="font-size:15px;font-weight:600;font-family:DM Mono,monospace;color:#fff;">' + (s25 > 0 ? formatSales(s25) : '-') + '</span>' +
      '</div>' +
      '<div style="height:5px;background:var(--border);border-radius:3px;margin-top:6px;"><div style="height:100%;width:' + barW + '%;background:' + bc + ';border-radius:3px;"></div></div>' +
    '</div>';
  });

  html += '</div>';
  area.innerHTML = html;
}

function updateRadius(val) {
  currentRadius = parseInt(val, 10);
  document.getElementById('radiusVal').textContent = currentRadius + 'km';
  if (activeStoreId === null) return;
  var store = allStores.find(function(s) { return s.id === activeStoreId; });
  if (!store) return;

  // 반경 원만 다시 그리기 (줌/센터 유지)
  removeRadiusCircle();
  if (mapEngine === 'kakao' && mapObj) {
    radiusCircle = new kakao.maps.Circle({
      center: new kakao.maps.LatLng(store.lat, store.lng),
      radius: currentRadius * 1000,
      strokeWeight: 2, strokeColor: '#e8463a', strokeOpacity: 0.6,
      strokeStyle: 'dash', fillColor: '#e8463a', fillOpacity: 0.08, map: mapObj
    });
  } else if (mapEngine === 'leaflet' && mapObj) {
    radiusCircle = L.circle([store.lat, store.lng], {
      radius: currentRadius * 1000, color: '#e8463a', weight: 2,
      opacity: 0.6, dashArray: '8,6', fillColor: '#e8463a', fillOpacity: 0.08
    }).addTo(mapObj);
  }

  // 경쟁사 목록 + 바차트만 갱신
  var nearby = findNearbyCompetitors(store, currentRadius);
  var mySales = findSalesData(store.brand, store.name);
  var compHtml = '';
  if (nearby.length > 0) {
    var barData = [];
    if (mySales) barData.push({ brand: store.brand, name: store.name, sales: mySales.s25, color: BRAND_COLORS[store.brand] });
    nearby.forEach(function(n) {
      if (n.sales && n.sales.s25 > 0) barData.push({ brand: n.store.brand, name: n.store.name, sales: n.sales.s25, color: BRAND_COLORS[n.store.brand], dist: n.dist });
    });
    barData.sort(function(a, b) { return b.sales - a.sales; });
    var maxSales = barData.length > 0 ? barData[0].sales : 1;
    var barHtml = '';
    if (barData.length > 1) {
      barHtml = '<div class="panel-section"><div class="panel-section-title">반경 ' + currentRadius + 'km 매출 비교</div><div class="bar-chart">';
      barData.slice(0, 8).forEach(function(d) {
        var pct = Math.max(5, (d.sales / maxSales) * 100);
        barHtml += '<div class="bar-row"><div class="bar-label">' + d.brand + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + d.color + ';"><span class="bar-value">' + formatSales(d.sales) + '</span></div></div></div>';
      });
      barHtml += '</div></div>';
    }
    compHtml = '<div class="panel-section"><div class="panel-section-title">근접 경쟁사 (' + nearby.length + ')</div>';
    nearby.slice(0, 10).forEach(function(n) {
      var distStr = n.dist < 1 ? Math.round(n.dist * 1000) + 'm' : n.dist.toFixed(1) + 'km';
      var salesStr = n.sales ? formatSales(n.sales.s25) : '';
      compHtml += '<div class="competitor-row"><div class="brand-dot" style="background:' + (BRAND_COLORS[n.store.brand] || '#888') + ';"></div><div class="comp-info"><div class="comp-name">' + n.store.brand + ' ' + displayName(n.store) + '</div><div class="comp-dist">' + distStr + '</div></div>' + (salesStr ? '<div class="comp-sales">' + salesStr + '</div>' : '') + '</div>';
    });
    compHtml += '</div>';
    compHtml = barHtml + compHtml;
  } else {
    compHtml = '<div class="panel-section"><div class="panel-section-title">근접 경쟁사</div><div style="font-size:11px;color:var(--text-dim);text-align:center;padding:12px;">반경 ' + currentRadius + 'km 내 경쟁사 없음</div></div>';
  }
  document.getElementById('panelCompetitorSection').innerHTML = compHtml;
}

function clearHeatmap() {
  heatmapCircles.forEach(function(c) {
    if (mapEngine === 'kakao') c.setMap(null);
    else if (mapEngine === 'leaflet' && mapObj) mapObj.removeLayer(c);
  });
  heatmapCircles = [];
}

function drawHeatmap() {
  var filtered = getFilteredStores();
  filtered.forEach(function(store) {
    var sales = findSalesData(store.brand, store.name);
    if (!sales || !sales.s25 || sales.s25 <= 0) return;

    var amt = sales.s25; // 백만원 단위
    var radius, opacity;
    if (amt >= 2000) { radius = 2800; opacity = 0.35; }       // 20억+
    else if (amt >= 1000) { radius = 2200; opacity = 0.25; }  // 10~20억
    else if (amt >= 500) { radius = 1600; opacity = 0.18; }   // 5~10억
    else { radius = 1000; opacity = 0.12; }                   // ~5억

    var color = BRAND_COLORS[store.brand] || '#e8463a';

    if (mapEngine === 'kakao' && mapObj) {
      var circle = new kakao.maps.Circle({
        center: new kakao.maps.LatLng(store.lat, store.lng),
        radius: radius,
        strokeWeight: 0,
        fillColor: color,
        fillOpacity: opacity,
        map: mapObj
      });
      heatmapCircles.push(circle);
    } else if (mapEngine === 'leaflet' && mapObj) {
      var circle = L.circle([store.lat, store.lng], {
        radius: radius,
        stroke: false,
        fillColor: color,
        fillOpacity: opacity
      }).addTo(mapObj);
      heatmapCircles.push(circle);
    }
  });
}

function toggleHeatmap() {
  heatmapActive = !heatmapActive;
  document.getElementById('btnHeatmap').classList.toggle('active', heatmapActive);
  document.getElementById('heatmapLegend').classList.toggle('visible', heatmapActive);

  if (!heatmapActive) {
    clearHeatmap();
    return;
  }
  drawHeatmap();
}

// 공백 분석
// ══════════════════════════════════════════
var gapActive = false;
var gapCircles = [];
var gapUncovered = [];
var currentView = 'map';
var gapMode = 'national';
var coverageRadius = 15; // km

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.header-tab').forEach(function(t) {
    t.classList.toggle('active', t.textContent.indexOf(view === 'map' ? '유통망' : '공백') !== -1);
  });

  var mapSidebar = document.querySelector('.sidebar:not(#gapSidebar)');
  var gapSidebarEl = document.getElementById('gapSidebar');
  var toolbar = document.querySelector('.map-toolbar');

  if (view === 'gap') {
    mapSidebar.style.display = 'none';
    gapSidebarEl.style.display = 'flex';
    toolbar.style.display = 'none';
    closePanel();
    closeCompare();
    closeRegionDashboard();
    gapActive = true;
    runCoverageAnalysis();
  } else {
    mapSidebar.style.display = 'flex';
    gapSidebarEl.style.display = 'none';
    toolbar.style.display = 'flex';
    gapActive = false;
    clearGapOverlays();
    updateMarkers();
  }
}

function switchGapMode(mode) {
  gapMode = mode;
  document.querySelectorAll('.gap-sub-tab').forEach(function(t) {
    t.classList.toggle('active', t.textContent.indexOf(mode === 'national' ? '전국' : '수도권') !== -1);
  });
  document.getElementById('gapFilterNational').style.display = mode === 'national' ? '' : 'none';
  document.getElementById('gapFilterMetro').style.display = mode === 'metro' ? '' : 'none';
  // 모드 전환 시 기본 반경 설정
  if (mode === 'national') coverageRadius = 15;
  else coverageRadius = 1;
  if (gapActive) runCoverageAnalysis();
}

function setCoverageRadius(r) {
  coverageRadius = r;
  var btnClass = gapMode === 'national' ? '.gap-radius-btn' : '.gap-radius-btn-metro';
  document.querySelectorAll(btnClass).forEach(function(b) {
    b.classList.toggle('active', parseInt(b.textContent) === r);
  });
  if (gapActive) runCoverageAnalysis();
}

function clearGapOverlays() {
  gapCircles.forEach(function(c) {
    if (mapEngine === 'kakao') c.setMap(null);
    else if (mapEngine === 'leaflet' && mapObj) mapObj.removeLayer(c);
  });
  gapCircles = [];
}

function runCoverageAnalysis() {
  clearGapOverlays();

  var metroRegions = ['서울','경기','인천'];
  var isMetro = gapMode === 'metro';

  // 대상 매장 필터링
  var iloomStores = allStores.filter(function(s) {
    if (s.brand !== '일룸') return false;
    return isMetro ? metroRegions.indexOf(s.region) !== -1 : true;
  });
  var competitors = allStores.filter(function(s) {
    if (s.brand === '일룸') return false;
    return isMetro ? metroRegions.indexOf(s.region) !== -1 : true;
  });

  // 각 경쟁사 매장 → 가장 가까운 일룸 거리 계산
  gapUncovered = [];
  competitors.forEach(function(comp) {
    var minDist = Infinity;
    var nearest = null;
    iloomStores.forEach(function(il) {
      var d = calcDistance(comp.lat, comp.lng, il.lat, il.lng);
      if (d < minDist) { minDist = d; nearest = il; }
    });
    comp._iloomDist = minDist;
    comp._nearestIloom = nearest;
    if (minDist > coverageRadius) {
      gapUncovered.push(comp);
    }
  });

  // 거리순 정렬 (먼 곳부터)
  gapUncovered.sort(function(a, b) { return b._iloomDist - a._iloomDist; });

  // 지역별 그룹핑
  var regionMap = {};
  gapUncovered.forEach(function(s) {
    var r = s.region || '기타';
    if (!regionMap[r]) regionMap[r] = [];
    regionMap[r].push(s);
  });
  var regionList = Object.keys(regionMap).sort(function(a, b) {
    return regionMap[b].length - regionMap[a].length;
  });

  // 지도에 표시: 일룸 커버리지 원(초록) + 커버리지 밖 경쟁사 마커(빨강)
  // 일룸 커버리지 원
  iloomStores.forEach(function(il) {
    if (mapEngine === 'kakao' && mapObj) {
      var circle = new kakao.maps.Circle({
        center: new kakao.maps.LatLng(il.lat, il.lng),
        radius: coverageRadius * 1000,
        strokeWeight: 1, strokeColor: '#34d399', strokeOpacity: 0.4, strokeStyle: 'solid',
        fillColor: '#34d399', fillOpacity: 0.08, map: mapObj
      });
      gapCircles.push(circle);
    } else if (mapEngine === 'leaflet' && mapObj) {
      var circle = L.circle([il.lat, il.lng], {
        radius: coverageRadius * 1000,
        color: '#34d399', weight: 1, opacity: 0.4,
        fillColor: '#34d399', fillOpacity: 0.08
      }).addTo(mapObj);
      gapCircles.push(circle);
    }
  });

  // 마커 표시: 일룸 + 커버리지 밖 경쟁사만
  var uncoveredIds = {};
  gapUncovered.forEach(function(s) { uncoveredIds[s.id] = true; });

  allStores.forEach(function(store) {
    if (!store.marker) return;
    var inScope = isMetro ? metroRegions.indexOf(store.region) !== -1 : true;
    var show = inScope && (store.brand === '일룸' || uncoveredIds[store.id]);
    if (mapEngine === 'kakao') store.marker.setMap(show ? mapObj : null);
    else if (mapEngine === 'leaflet') {
      if (show) { if (!mapObj.hasLayer(store.marker)) store.marker.addTo(mapObj); }
      else mapObj.removeLayer(store.marker);
    }
  });

  // 수도권이면 줌
  if (isMetro) {
    if (mapEngine === 'kakao' && mapObj) {
      mapObj.setCenter(new kakao.maps.LatLng(37.5, 127.0));
      mapObj.setLevel(9);
    } else if (mapEngine === 'leaflet' && mapObj) {
      mapObj.setView([37.5, 127.0], 10, { animate: true });
    }
  }

  // 요약 카드
  var coveredCount = competitors.length - gapUncovered.length;
  var covPct = competitors.length > 0 ? Math.round(coveredCount / competitors.length * 100) : 0;
  var summaryHtml = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
    '<span style="color:var(--text);">커버리지 <strong style="color:#34d399;">' + covPct + '%</strong></span>' +
    '<span style="font-size:11px;color:var(--text-dim);">' + coveredCount + '/' + competitors.length + '개 매장</span>' +
  '</div>' +
  '<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">' +
    '<div style="width:' + covPct + '%;height:100%;background:#34d399;border-radius:3px;"></div>' +
  '</div>' +
  '<div style="margin-top:8px;font-size:12px;">' +
    '<span style="color:#f87171;font-weight:600;">커버리지 밖 ' + gapUncovered.length + '개</span> 경쟁사 매장' +
  '</div>';
  document.getElementById('gapSummary').innerHTML = summaryHtml;

  // 결과 리스트: 지역별 그룹
  var html = '';
  regionList.forEach(function(region) {
    var stores = regionMap[region];
    var brandCount = {};
    stores.forEach(function(s) {
      brandCount[s.brand] = (brandCount[s.brand] || 0) + 1;
    });

    html += '<div style="padding:10px 16px;border-bottom:1px solid var(--border);">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
        '<span style="font-weight:700;font-size:13px;">' + region + '</span>' +
        '<span style="font-size:11px;color:#f87171;font-weight:600;">' + stores.length + '개 매장</span>' +
      '</div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">' +
        Object.keys(brandCount).map(function(b) {
          return '<span style="font-size:10px;padding:2px 6px;border-radius:3px;color:#fff;background:' + (BRAND_COLORS[b]||'#888') + ';">' + b + ' ' + brandCount[b] + '</span>';
        }).join('') +
      '</div>';

    stores.forEach(function(s) {
      html += '<div class="gap-zone" onclick="focusStore(' + s.id + ')" style="padding:8px 10px;margin-bottom:4px;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<span><span style="color:' + (BRAND_COLORS[s.brand]||'#888') + ';font-weight:600;">' + s.brand + '</span> ' + displayName(s) + '</span>' +
          '<span style="font-size:10px;color:#f87171;font-family:DM Mono,monospace;">' + s._iloomDist.toFixed(1) + 'km</span>' +
        '</div>' +
        '<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">가장 가까운 일룸: ' + (s._nearestIloom ? displayName(s._nearestIloom) : '-') + '</div>' +
      '</div>';
    });

    html += '</div>';
  });

  if (gapUncovered.length === 0) {
    html = '<div style="text-align:center;color:var(--text-dim);padding:32px 20px;">커버리지 ' + coverageRadius + 'km 내 모든 경쟁사가 포함됩니다</div>';
  }

  document.getElementById('gapResults').innerHTML = html;
}

function focusStore(storeId) {
  var store = allStores.find(function(s) { return s.id === storeId; });
  if (!store) return;
  if (mapEngine === 'kakao' && mapObj) {
    mapObj.setCenter(new kakao.maps.LatLng(store.lat, store.lng));
    mapObj.setLevel(5);
  } else if (mapEngine === 'leaflet' && mapObj) {
    mapObj.setView([store.lat, store.lng], 14, { animate: true });
  }
}

// 출고지 분석 (데이터 연동 대기)

var shipmentActive = false;
function toggleShipment() {

  document.getElementById('btnShipment').classList.toggle('active', shipmentActive);
  if (shipmentActive) {
    alert('출고지 데이터가 아직 연동되지 않았습니다.\n엑셀 파일을 제공해주시면 활성화됩니다.');

    document.getElementById('btnShipment').classList.remove('active');

}
